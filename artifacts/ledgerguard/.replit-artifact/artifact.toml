kind = "web"
previewPath = "/"
title = "LedgerGuard"
version = "1.0.0"
id = "artifacts/ledgerguard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23493

[services.development]
run = "pnpm --filter @workspace/ledgerguard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ledgerguard", "run", "build" ]
publicDir = "artifacts/ledgerguard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23493"
BASE_PATH = "/"
